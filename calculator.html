<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Calculator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --light-bg: #f5f7fa;
            --light-card: #ffffff;
            --light-text: #1a1a2e;
            --light-border: #e0e6ed;
            --dark-bg: #0f1419;
            --dark-card: #1a1f2e;
            --dark-text: #e8eef5;
            --dark-border: #2a3142;
            --primary: #6366f1;
            --primary-light: #818cf8;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Inter', sans-serif;
            transition: background 0.3s ease;
        }

        body.dark-mode {
            background: linear-gradient(135deg, #0f1419 0%, #1a1f2e 100%);
        }

        .container {
            display: flex;
            gap: 20px;
            padding: 20px;
            max-width: 1000px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .calculator-wrapper {
            position: relative;
        }

        .calculator {
            width: 420px;
            background: var(--light-card);
            border-radius: 24px;
            box-shadow: 0 20px 80px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            transition: background 0.3s ease, box-shadow 0.3s ease;
        }

        body.dark-mode .calculator {
            background: var(--dark-card);
            box-shadow: 0 20px 80px rgba(0, 0, 0, 0.8);
        }

        .calc-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            background: var(--light-border);
            border-bottom: 1px solid var(--light-border);
            transition: background 0.3s ease;
        }

        body.dark-mode .calc-header {
            background: var(--dark-border);
            border-bottom-color: var(--dark-border);
        }

        .calc-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--light-text);
        }

        body.dark-mode .calc-title {
            color: var(--dark-text);
        }

        .theme-toggle {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            padding: 4px;
            transition: transform 0.2s ease;
        }

        .theme-toggle:hover {
            transform: scale(1.2);
        }

        .display {
            background: var(--light-text);
            color: #fff;
            font-size: 3em;
            padding: 24px 20px;
            text-align: right;
            word-wrap: break-word;
            word-break: break-all;
            min-height: 100px;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            justify-content: flex-end;
            font-family: 'Roboto Mono', monospace;
            position: relative;
            transition: background 0.3s ease;
        }

        body.dark-mode .display {
            background: #0f1419;
        }

        .previous-operand {
            font-size: 0.6em;
            opacity: 0.7;
            color: rgba(255, 255, 255, 0.8);
            min-height: 24px;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 1px;
            background: var(--light-border);
            padding: 1px;
            transition: background 0.3s ease;
        }

        body.dark-mode .buttons {
            background: var(--dark-border);
        }

        button {
            padding: 18px 12px;
            font-size: 1.2em;
            border: none;
            cursor: pointer;
            background: #f5f5f5;
            color: var(--light-text);
            transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
            font-weight: 600;
            font-family: 'Inter', sans-serif;
        }

        body.dark-mode button {
            background: #2a3142;
            color: var(--dark-text);
        }

        button:hover {
            background: #e8ecf1;
            transform: translateY(-2px);
        }

        body.dark-mode button:hover {
            background: #3a4252;
        }

        button:active {
            transform: translateY(0);
            background: #d8dce3;
        }

        body.dark-mode button:active {
            background: #2a3142;
        }

        .operator {
            background: var(--primary);
            color: #fff;
            font-weight: bold;
        }

        .operator:hover {
            background: var(--primary-light);
        }

        .operator:active {
            background: var(--primary);
        }

        .equals {
            background: var(--success);
            color: #fff;
            font-weight: bold;
            grid-column: span 2;
        }

        .equals:hover {
            background: #059669;
        }

        .equals:active {
            background: var(--success);
        }

        .clear {
            background: var(--danger);
            color: #fff;
            font-weight: bold;
        }

        .clear:hover {
            background: #dc2626;
        }

        .clear:active {
            background: var(--danger);
        }

        .delete {
            background: var(--warning);
            color: #fff;
            font-weight: bold;
        }

        .delete:hover {
            background: #d97706;
        }

        .delete:active {
            background: var(--warning);
        }

        .scientific {
            background: #8b5cf6;
            color: #fff;
        }

        .scientific:hover {
            background: #a78bfa;
        }

        .memory {
            background: #06b6d4;
            color: #fff;
            font-size: 1em;
        }

        .memory:hover {
            background: #22d3ee;
        }

        .memory.active {
            background: #0891b2;
        }

        /* History Sidebar */
        .history-panel {
            width: 280px;
            background: var(--light-card);
            border-radius: 24px;
            box-shadow: 0 20px 80px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: background 0.3s ease;
        }

        body.dark-mode .history-panel {
            background: var(--dark-card);
        }

        .history-header {
            padding: 16px 20px;
            background: var(--light-border);
            border-bottom: 1px solid var(--light-border);
            font-weight: 700;
            color: var(--light-text);
            transition: background 0.3s ease;
        }

        body.dark-mode .history-header {
            background: var(--dark-border);
            color: var(--dark-text);
        }

        .history-items {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }

        .history-items::-webkit-scrollbar {
            width: 6px;
        }

        .history-items::-webkit-scrollbar-track {
            background: var(--light-border);
        }

        body.dark-mode .history-items::-webkit-scrollbar-track {
            background: var(--dark-border);
        }

        .history-items::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 3px;
        }

        .history-items::-webkit-scrollbar-thumb:hover {
            background: #999;
        }

        .history-item {
            padding: 10px;
            margin-bottom: 8px;
            background: var(--light-border);
            border-radius: 8px;
            font-size: 0.9em;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Roboto Mono', monospace;
            color: var(--light-text);
        }

        body.dark-mode .history-item {
            background: var(--dark-border);
            color: var(--dark-text);
        }

        .history-item:hover {
            background: var(--primary);
            color: white;
            transform: translateX(4px);
        }

        .history-clear {
            padding: 12px 20px;
            background: var(--light-border);
            border-top: 1px solid var(--light-border);
            border: none;
            cursor: pointer;
            font-size: 0.9em;
            color: var(--danger);
            font-weight: 600;
            transition: background 0.3s ease;
        }

        body.dark-mode .history-clear {
            background: var(--dark-border);
            border-color: var(--dark-border);
        }

        .history-clear:hover {
            background: rgba(239, 68, 68, 0.1);
        }

        .memory-display {
            padding: 12px 20px;
            background: var(--light-border);
            border-top: 1px solid var(--light-border);
            text-align: center;
            font-size: 0.85em;
            color: #666;
            font-weight: 500;
        }

        body.dark-mode .memory-display {
            background: var(--dark-border);
            color: #aaa;
        }

        @media (max-width: 700px) {
            .container {
                flex-direction: column;
                align-items: stretch;
            }

            .calculator {
                width: 100%;
                max-width: 420px;
                margin: 0 auto;
            }

            .history-panel {
                width: 100%;
                max-width: 420px;
                margin: 0 auto;
                height: 300px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="calculator-wrapper">
            <div class="calculator">
                <div class="calc-header">
                    <div class="calc-title">Pro Calculator</div>
                    <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme">🌙</button>
                </div>
                <div class="display">
                    <div class="previous-operand" id="previousOperand"></div>
                    <div id="display" style="font-size: 2.5em;">0</div>
                </div>
                <div class="buttons">
                    <!-- Row 1: Memory & Basic Operations -->
                    <button class="memory" onclick="memoryClear()" title="Memory Clear">MC</button>
                    <button class="memory" onclick="memoryRecall()" title="Memory Recall">MR</button>
                    <button class="memory active" onclick="memoryAdd()" title="Memory Add">M+</button>
                    <button class="memory" onclick="memorySub()" title="Memory Subtract">M-</button>
                    <button class="clear" onclick="clearDisplay()">AC</button>

                    <!-- Row 2: Scientific & Functions -->
                    <button class="scientific" onclick="calculateSquareRoot()" title="Square Root">√</button>
                    <button class="scientific" onclick="calculatePower()" title="Power">x²</button>
                    <button class="scientific" onclick="calculatePercent()" title="Percentage">%</button>
                    <button class="delete" onclick="deleteLastChar()">DEL</button>
                    <button class="operator" onclick="appendOperator('/')">/</button>

                    <!-- Row 3: Numbers 7-9 -->
                    <button onclick="appendNumber('7')">7</button>
                    <button onclick="appendNumber('8')">8</button>
                    <button onclick="appendNumber('9')">9</button>
                    <button class="operator" onclick="appendOperator('*')">×</button>
                    <button class="operator" onclick="appendOperator('-')">−</button>

                    <!-- Row 4: Numbers 4-6 -->
                    <button onclick="appendNumber('4')">4</button>
                    <button onclick="appendNumber('5')">5</button>
                    <button onclick="appendNumber('6')">6</button>
                    <button class="operator" onclick="appendOperator('+')" style="grid-column: span 2;">+</button>

                    <!-- Row 5: Numbers 1-3 -->
                    <button onclick="appendNumber('1')">1</button>
                    <button onclick="appendNumber('2')">2</button>
                    <button onclick="appendNumber('3')">3</button>
                    <button class="equals" onclick="calculate()" style="grid-row: span 2; grid-column: span 2;">=</button>

                    <!-- Row 6: 0 and Decimal -->
                    <button onclick="appendNumber('0')" style="grid-column: span 3;">0</button>
                    <button onclick="appendNumber('.')">.</button>
                </div>
                <div class="memory-display" id="memoryDisplay">Memory: 0</div>
            </div>
        </div>

        <div class="history-panel">
            <div class="history-header">📊 History</div>
            <div class="history-items" id="historyItems"></div>
            <button class="history-clear" onclick="clearHistory()">Clear History</button>
        </div>
    </div>

    <script>
        let display = document.getElementById('display');
        let previousOperand = document.getElementById('previousOperand');
        let currentValue = '0';
        let previousValue = '';
        let operation = null;
        let shouldResetDisplay = false;
        let memory = 0;
        let history = [];
        let isDarkMode = false;

        // Load saved preferences
        function loadPreferences() {
            const savedTheme = localStorage.getItem('theme');
            const savedMemory = localStorage.getItem('memory');
            const savedHistory = localStorage.getItem('history');

            if (savedTheme === 'dark') toggleTheme();
            if (savedMemory) memory = parseFloat(savedMemory);
            if (savedHistory) history = JSON.parse(savedHistory);

            updateMemoryDisplay();
            renderHistory();
        }

        function toggleTheme() {
            isDarkMode = !isDarkMode;
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('theme', isDarkMode ? 'dark' : 'light');
            document.querySelector('.theme-toggle').textContent = isDarkMode ? '☀️' : '🌙';
        }

        function updateDisplay() {
            display.textContent = currentValue;
            previousOperand.textContent = previousValue && operation ? `${previousValue} ${operation === '.' ? ',' : operation}` : '';
        }

        function updateMemoryDisplay() {
            document.getElementById('memoryDisplay').textContent = `Memory: ${memory}`;
            localStorage.setItem('memory', memory);
        }

        function appendNumber(num) {
            if (shouldResetDisplay) {
                currentValue = num;
                shouldResetDisplay = false;
            } else {
                if (currentValue === '0' && num !== '.') {
                    currentValue = num;
                } else if (num === '.' && currentValue.includes('.')) {
                    return;
                } else {
                    currentValue += num;
                }
            }
            updateDisplay();
        }

        function appendOperator(op) {
            if (operation !== null && !shouldResetDisplay) {
                calculate();
            }
            previousValue = currentValue;
            operation = op;
            shouldResetDisplay = true;
            updateDisplay();
        }

        function calculate() {
            if (operation === null || shouldResetDisplay) {
                return;
            }

            let result;
            const prev = parseFloat(previousValue);
            const curr = parseFloat(currentValue);

            switch (operation) {
                case '+':
                    result = prev + curr;
                    break;
                case '-':
                    result = prev - curr;
                    break;
                case '*':
                    result = prev * curr;
                    break;
                case '/':
                    result = curr !== 0 ? prev / curr : 'Error';
                    break;
                case '.':
                    result = prev + curr;
                    break;
                default:
                    return;
            }

            // Add to history
            const calculation = `${previousValue} ${operation} ${currentValue} = ${result}`;
            history.unshift(calculation);
            if (history.length > 50) history.pop();
            localStorage.setItem('history', JSON.stringify(history));
            renderHistory();

            currentValue = result.toString();
            operation = null;
            shouldResetDisplay = true;
            updateDisplay();
        }

        function clearDisplay() {
            currentValue = '0';
            previousValue = '';
            operation = null;
            shouldResetDisplay = false;
            updateDisplay();
        }

        function deleteLastChar() {
            if (currentValue.length > 1) {
                currentValue = currentValue.slice(0, -1);
            } else {
                currentValue = '0';
            }
            updateDisplay();
        }

        // Scientific Functions
        function calculateSquareRoot() {
            const num = parseFloat(currentValue);
            if (num < 0) {
                currentValue = 'Error';
            } else {
                currentValue = Math.sqrt(num).toString();
                history.unshift(`√${num} = ${currentValue}`);
                if (history.length > 50) history.pop();
                localStorage.setItem('history', JSON.stringify(history));
                renderHistory();
            }
            shouldResetDisplay = true;
            updateDisplay();
        }

        function calculatePower() {
            const num = parseFloat(currentValue);
            currentValue = (num * num).toString();
            history.unshift(`${num}² = ${currentValue}`);
            if (history.length > 50) history.pop();
            localStorage.setItem('history', JSON.stringify(history));
            renderHistory();
            shouldResetDisplay = true;
            updateDisplay();
        }

        function calculatePercent() {
            if (previousValue && operation) {
                const prev = parseFloat(previousValue);
                const curr = parseFloat(currentValue);
                currentValue = ((prev * curr) / 100).toString();
            } else {
                currentValue = (parseFloat(currentValue) / 100).toString();
            }
            updateDisplay();
        }

        // Memory Functions
        function memoryClear() {
            memory = 0;
            updateMemoryDisplay();
        }

        function memoryRecall() {
            currentValue = memory.toString();
            shouldResetDisplay = true;
            updateDisplay();
        }

        function memoryAdd() {
            memory += parseFloat(currentValue);
            updateMemoryDisplay();
        }

        function memorySub() {
            memory -= parseFloat(currentValue);
            updateMemoryDisplay();
        }

        // History Functions
        function renderHistory() {
            const historyItems = document.getElementById('historyItems');
            historyItems.innerHTML = history.map((item, index) => 
                `<div class="history-item" onclick="useHistory(${index})">${item}</div>`
            ).join('');
        }

        function useHistory(index) {
            const item = history[index];
            const result = item.split('=')[1].trim();
            currentValue = result;
            shouldResetDisplay = true;
            updateDisplay();
        }

        function clearHistory() {
            if (confirm('Clear all history?')) {
                history = [];
                localStorage.setItem('history', JSON.stringify(history));
                renderHistory();
            }
        }

        // Keyboard support
        document.addEventListener('keydown', (event) => {
            if (event.key >= '0' && event.key <= '9') appendNumber(event.key);
            if (event.key === '.') appendNumber('.');
            if (event.key === '+') { event.preventDefault(); appendOperator('+'); }
            if (event.key === '-') { event.preventDefault(); appendOperator('-'); }
            if (event.key === '*') { event.preventDefault(); appendOperator('*'); }
            if (event.key === '/') { event.preventDefault(); appendOperator('/'); }
            if (event.key === 'Enter') { event.preventDefault(); calculate(); }
            if (event.key === 'Backspace') { event.preventDefault(); deleteLastChar(); }
            if (event.key === 'Escape') clearDisplay();
        });

        // Initialize
        loadPreferences();
        updateDisplay();
    </script>
</body>
</html>
