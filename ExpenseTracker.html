<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 600px;
            padding: 30px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            text-align: center;
            font-size: 2.5em;
        }

        .summary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
            text-align: center;
        }

        .summary-item {
            display: inline-block;
            margin: 0 15px;
        }

        .summary-item p {
            font-size: 0.9em;
            opacity: 0.9;
            margin-bottom: 5px;
        }

        .summary-item span {
            font-size: 1.8em;
            font-weight: bold;
        }

        .form-section {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: 500;
        }

        input, select {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 5px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .expenses-section h2 {
            color: #333;
            margin-bottom: 15px;
            font-size: 1.5em;
        }

        .expense-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .expense-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            border-left: 5px solid #667eea;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .expense-item:hover {
            transform: translateX(5px);
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
        }

        .expense-info {
            flex: 1;
        }

        .expense-description {
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }

        .expense-category {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.8em;
            margin-right: 10px;
        }

        .expense-date {
            color: #888;
            font-size: 0.85em;
        }

        .expense-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .expense-amount {
            font-size: 1.3em;
            font-weight: bold;
            color: #764ba2;
            min-width: 70px;
            text-align: right;
        }

        .delete-btn {
            background: #ff6b6b;
            border: none;
            color: white;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            width: auto;
            transition: background 0.3s;
        }

        .delete-btn:hover {
            background: #ff5252;
        }

        .empty-message {
            text-align: center;
            color: #999;
            padding: 30px;
            font-style: italic;
        }

        .filter-section {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .filter-btn {
            flex: 1;
            padding: 8px;
            border: 2px solid #ddd;
            background: white;
            color: #333;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.3s;
        }

        .filter-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 1.8em;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            .summary-item {
                display: block;
                margin: 10px 0;
            }

            .expense-item {
                flex-direction: column;
                align-items: flex-start;
            }

            .expense-right {
                width: 100%;
                justify-content: space-between;
                margin-top: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>💰 Expense Tracker</h1>
        
        <div class="summary">
            <div class="summary-item">
                <p>Total Spent</p>
                <span id="totalAmount">$0.00</span>
            </div>
            <div class="summary-item">
                <p>Total Expenses</p>
                <span id="expenseCount">0</span>
            </div>
        </div>

        <div class="form-section">
            <form id="expenseForm">
                <div class="form-group">
                    <label for="description">Description</label>
                    <input type="text" id="description" placeholder="e.g., Groceries, Gas, Movie" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="amount">Amount ($)</label>
                        <input type="number" id="amount" placeholder="0.00" min="0.01" step="0.01" required>
                    </div>
                    <div class="form-group">
                        <label for="category">Category</label>
                        <select id="category" required>
                            <option value="Food">Food</option>
                            <option value="Transport">Transport</option>
                            <option value="Entertainment">Entertainment</option>
                            <option value="Shopping">Shopping</option>
                            <option value="Bills">Bills</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                </div>

                <button type="submit">Add Expense</button>
            </form>
        </div>

        <div class="expenses-section">
            <h2>Expenses</h2>
            <div class="filter-section">
                <button class="filter-btn active" data-filter="All">All</button>
                <button class="filter-btn" data-filter="Food">Food</button>
                <button class="filter-btn" data-filter="Transport">Transport</button>
                <button class="filter-btn" data-filter="Entertainment">Entertainment</button>
                <button class="filter-btn" data-filter="Shopping">Shopping</button>
                <button class="filter-btn" data-filter="Bills">Bills</button>
            </div>
            <div class="expense-list" id="expenseList">
                <div class="empty-message">No expenses yet. Add one to get started!</div>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('expenseForm');
        const descriptionInput = document.getElementById('description');
        const amountInput = document.getElementById('amount');
        const categorySelect = document.getElementById('category');
        const expenseList = document.getElementById('expenseList');
        const totalAmountDisplay = document.getElementById('totalAmount');
        const expenseCountDisplay = document.getElementById('expenseCount');
        const filterBtns = document.querySelectorAll('.filter-btn');
        
        let expenses = JSON.parse(localStorage.getItem('expenses')) || [];
        let currentFilter = 'All';

        // Load expenses on page load
        function loadExpenses() {
            renderExpenses();
            updateSummary();
        }

        // Add expense
        form.addEventListener('submit', (e) => {
            e.preventDefault();

            const expense = {
                id: Date.now(),
                description: descriptionInput.value,
                amount: parseFloat(amountInput.value),
                category: categorySelect.value,
                date: new Date().toLocaleDateString()
            };

            expenses.push(expense);
            localStorage.setItem('expenses', JSON.stringify(expenses));

            // Reset form
            form.reset();
            renderExpenses();
            updateSummary();
        });

        // Render expenses
        function renderExpenses() {
            const filteredExpenses = currentFilter === 'All' 
                ? expenses 
                : expenses.filter(exp => exp.category === currentFilter);

            if (filteredExpenses.length === 0) {
                expenseList.innerHTML = '<div class="empty-message">No expenses found for this category.</div>';
                return;
            }

            expenseList.innerHTML = filteredExpenses.map(expense => `
                <div class="expense-item">
                    <div class="expense-info">
                        <div class="expense-description">${expense.description}</div>
                        <div>
                            <span class="expense-category">${expense.category}</span>
                            <span class="expense-date">${expense.date}</span>
                        </div>
                    </div>
                    <div class="expense-right">
                        <div class="expense-amount">$${expense.amount.toFixed(2)}</div>
                        <button class="delete-btn" onclick="deleteExpense(${expense.id})">Delete</button>
                    </div>
                </div>
            `).join('');
        }

        // Delete expense
        function deleteExpense(id) {
            expenses = expenses.filter(exp => exp.id !== id);
            localStorage.setItem('expenses', JSON.stringify(expenses));
            renderExpenses();
            updateSummary();
        }

        // Update summary
        function updateSummary() {
            const total = expenses.reduce((sum, exp) => sum + exp.amount, 0);
            totalAmountDisplay.textContent = `$${total.toFixed(2)}`;
            expenseCountDisplay.textContent = expenses.length;
        }

        // Filter functionality
        filterBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                filterBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
                renderExpenses();
            });
        });

        // Initialize on load
        loadExpenses();
    </script>
</body>
</html>
