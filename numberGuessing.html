<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Number Guessing Game</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1d2b64, #f8cdda);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .game-container {
      background: #fff;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.25);
      text-align: center;
      width: 400px;
      animation: fadeIn 1s ease-in-out;
    }
    h1 {
      color: #1d2b64;
      margin-bottom: 10px;
    }
    p {
      font-size: 15px;
      color: #555;
    }
    input {
      padding: 12px;
      width: 80%;
      border: 2px solid #1d2b64;
      border-radius: 10px;
      margin-top: 15px;
      font-size: 16px;
      text-align: center;
      outline: none;
      transition: 0.3s;
    }
    input:focus {
      border-color: #f8cdda;
      box-shadow: 0 0 8px rgba(248,205,218,0.6);
    }
    button {
      padding: 12px 25px;
      margin: 15px 8px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }
    button:hover {
      transform: translateY(-2px);
    }
    .submit-btn {
      background: #1d2b64;
      color: #fff;
    }
    .reset-btn {
      background: #f76c6c;
      color: #fff;
    }
    #result {
      margin-top: 20px;
      font-weight: bold;
      font-size: 18px;
      color: #222;
      min-height: 24px;
    }
    #attempts {
      margin-top: 10px;
      font-size: 14px;
      color: #666;
    }
    .progress-bar {
      margin-top: 20px;
      width: 100%;
      background: #eee;
      border-radius: 10px;
      overflow: hidden;
    }
    .progress {
      height: 12px;
      background: linear-gradient(90deg, #1d2b64, #f8cdda);
      width: 0%;
      transition: width 0.4s ease;
    }
    @keyframes fadeIn {
      from {opacity: 0; transform: translateY(-20px);}
      to {opacity: 1; transform: translateY(0);}
    }
  </style>
</head>
<body>
  <div class="game-container">
    <h1>🎯 Number Guessing Game</h1>
    <p>Guess a number between <strong>1 and 100</strong>:</p>
    <input type="number" id="guessInput" placeholder="Enter your guess">
    <br>
    <button class="submit-btn" onclick="guessNumber()">Submit Guess</button>
    <button class="reset-btn" onclick="resetGame()">Reset Game</button>
    <p id="result"></p>
    <p id="attempts"></p>
    <div class="progress-bar">
      <div class="progress" id="progress"></div>
    </div>
  </div>

  <script>
    let secretNumber;
    let attempts;
    let maxAttempts = 10; // professional touch: limit attempts

    function startGame() {
      secretNumber = Math.floor(Math.random() * 100) + 1;
      attempts = 0;
      document.getElementById("result").textContent = "";
      document.getElementById("attempts").textContent = "Attempts left: " + maxAttempts;
      document.getElementById("guessInput").value = "";
      document.getElementById("progress").style.width = "0%";
    }

    function guessNumber() {
      const userGuess = parseInt(document.getElementById("guessInput").value);
      if (!userGuess || userGuess < 1 || userGuess > 100) {
        document.getElementById("result").textContent = "⚠️ Enter a valid number (1-100).";
        return;
      }

      attempts++;
      let attemptsLeft = maxAttempts - attempts;
      document.getElementById("attempts").textContent = "Attempts left: " + attemptsLeft;
      document.getElementById("progress").style.width = ((attempts / maxAttempts) * 100) + "%";

      if (userGuess === secretNumber) {
        document.getElementById("result").textContent =
          `🎉 Correct! You guessed it in ${attempts} tries.`;
      } else if (attempts >= maxAttempts) {
        document.getElementById("result").textContent =
          `❌ Game Over! The number was ${secretNumber}.`;
      } else if (userGuess > secretNumber) {
        document.getElementById("result").textContent = "⬆️ Too high! Try again.";
      } else {
        document.getElementById("result").textContent = "⬇️ Too low! Try again.";
      }
    }

    function resetGame() {
      startGame();
    }

    window.onload = startGame;
  </script>
</body>
</html>
