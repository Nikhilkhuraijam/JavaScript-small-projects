<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Number Guessing Game</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #74ebd5 0%, #9face6 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .game-container {
      background: #fff;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
      text-align: center;
      width: 350px;
      animation: fadeIn 1s ease-in-out;
    }
    h1 {
      color: #4a4a8c;
      margin-bottom: 15px;
    }
    p {
      font-size: 16px;
      color: #333;
    }
    input {
      padding: 10px;
      width: 80%;
      border: 2px solid #4a4a8c;
      border-radius: 8px;
      margin-top: 10px;
      font-size: 16px;
      text-align: center;
    }
    button {
      padding: 10px 20px;
      margin: 10px 5px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }
    button:hover {
      transform: scale(1.05);
    }
    .submit-btn {
      background: #4a4a8c;
      color: #fff;
    }
    .reset-btn {
      background: #f76c6c;
      color: #fff;
    }
    #result {
      margin-top: 20px;
      font-weight: bold;
      font-size: 18px;
      color: #222;
      min-height: 24px;
    }
    @keyframes fadeIn {
      from {opacity: 0; transform: translateY(-20px);}
      to {opacity: 1; transform: translateY(0);}
    }
  </style>
</head>
<body>
  <div class="game-container">
    <h1>🎯 Number Guessing Game</h1>
    <p>Guess a number between <strong>1 and 100</strong>:</p>
    <input type="number" id="guessInput" placeholder="Enter your guess">
    <br>
    <button class="submit-btn" onclick="guessNumber()">Submit Guess</button>
    <button class="reset-btn" onclick="resetGame()">Reset Game</button>
    <p id="result"></p>
  </div>

  <script>
    let secretNumber;
    let attempts;

    function startGame() {
      secretNumber = Math.floor(Math.random() * 100) + 1;
      attempts = 0;
      document.getElementById("result").textContent = "";
      document.getElementById("guessInput").value = "";
    }

    function guessNumber() {
      const userGuess = parseInt(document.getElementById("guessInput").value);
      attempts++;

      if (!userGuess || userGuess < 1 || userGuess > 100) {
        document.getElementById("result").textContent = "⚠️ Please enter a valid number between 1 and 100.";
        return;
      }

      if (userGuess === secretNumber) {
        document.getElementById("result").textContent =
          `🎉 Correct! You guessed it in ${attempts} tries.`;
      } else if (userGuess > secretNumber) {
        document.getElementById("result").textContent = "⬆️ Too high! Try again.";
      } else {
        document.getElementById("result").textContent = "⬇️ Too low! Try again.";
      }
    }

    function resetGame() {
      startGame();
    }

    window.onload = startGame;
  </script>
</body>
</html>
