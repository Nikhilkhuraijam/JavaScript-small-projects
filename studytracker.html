<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Study Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg:       #f0f2f5;
      --surface:  #ffffff;
      --surface2: #f7f8fa;
      --border:   #dde1e7;
      --text:     #1a1d23;
      --muted:    #6b7280;
      --accent:   #2563eb;
      --accent-lt:#eff4ff;
      --green:    #16a34a;
      --red:      #dc2626;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      padding: 40px 20px;
    }

    .container {
      width: 100%;
      max-width: 680px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* ── HEADER ── */
    .header {
      text-align: center;
      padding: 10px 0 4px;
    }

    .header-label {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      color: var(--accent);
      letter-spacing: 0.1em;
      margin-bottom: 8px;
    }

    .header h1 {
      font-size: 42px;
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -0.03em;
      color: var(--text);
    }

    .header-sub {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      color: var(--muted);
      margin-top: 10px;
      letter-spacing: 0.03em;
    }

    /* ── CARD ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.05);
    }

    .card-title {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--accent);
      letter-spacing: 0.08em;
      margin-bottom: 16px;
    }

    .input-row {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex: 1;
    }

    .input-group label {
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.07em;
    }

    .input-group input {
      -webkit-appearance: none;
      -moz-appearance: none;
      appearance: none;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      font-family: 'DM Mono', monospace;
      font-size: 14px;
      color: var(--text);
      outline: none;
      transition: border-color 0.15s ease;
      width: 100%;
    }

    .input-group input:focus {
      border-color: var(--accent);
      background: var(--accent-lt);
    }

    .input-group input::placeholder {
      color: var(--muted);
      opacity: 0.6;
    }

    .card button {
      -webkit-appearance: none;
      -moz-appearance: none;
      appearance: none;
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 11px;
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.02em;
      transition: opacity 0.15s ease, transform 0.1s ease;
    }

    .card button:hover {
      opacity: 0.88;
      transform: translateY(-1px);
    }

    .card button:active {
      transform: translateY(0);
    }

    /* ── STATS ── */
    .stats-row {
      display: flex;
      gap: 12px;
    }

    .stat-box {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px 16px;
      text-align: center;
      box-shadow: 0 1px 4px rgba(0,0,0,0.04);
    }

    .stat-value {
      font-size: 32px;
      font-weight: 800;
      color: var(--accent);
      letter-spacing: -0.03em;
      line-height: 1;
      margin-bottom: 6px;
    }

    .stat-label {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.05em;
    }

    /* ── SESSION LIST ── */
    .sessions-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.05);
    }

    .sessions-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--surface2);
    }

    .sessions-title {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--accent);
      letter-spacing: 0.08em;
    }

    .sessions-count {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--muted);
    }

    #sessionList {
      list-style: none;
      max-height: 320px;
      overflow-y: auto;
    }

    #sessionList li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 13px 20px;
      border-bottom: 1px solid var(--border);
      transition: background 0.1s ease;
    }

    #sessionList li:last-child {
      border-bottom: none;
    }

    #sessionList li:hover {
      background: var(--surface2);
    }

    .session-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
      opacity: 0.6;
    }

    .session-topic {
      flex: 1;
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
    }

    .session-badge {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      background: var(--accent-lt);
      color: var(--accent);
      padding: 3px 10px;
      border-radius: 20px;
      border: 1px solid #c7d7fd;
      white-space: nowrap;
    }

    .delete-btn {
      -webkit-appearance: none;
      -moz-appearance: none;
      appearance: none;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      width: 26px;
      height: 26px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 11px;
      display: grid;
      place-items: center;
      transition: all 0.15s ease;
      flex-shrink: 0;
    }

    .delete-btn:hover {
      background: #fee2e2;
      border-color: var(--red);
      color: var(--red);
    }

    /* ── EMPTY STATE ── */
    .empty-state {
      padding: 48px 20px;
      text-align: center;
    }

    .empty-icon {
      font-size: 28px;
      color: var(--muted);
      opacity: 0.4;
      margin-bottom: 10px;
    }

    .empty-text {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      color: var(--muted);
    }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--muted); }
  </style>
</head>
<body>
  <div class="container">

    <div class="header">
      <div class="header-label">// dashboard</div>
      <h1>Study<br>Tracker</h1>
      <div class="header-sub">log sessions · track progress · stay consistent</div>
    </div>

    <div class="card">
      <div class="card-title">// new session</div>
      <div class="input-row">
        <div class="input-group">
          <label>Topic</label>
          <input id="topic" placeholder="e.g. DSA, React, OS…">
        </div>
        <div class="input-group">
          <label>Hours</label>
          <input id="hours" type="number" placeholder="2.5" step="0.5" min="0">
        </div>
      </div>
      <button onclick="addSession()">+ Add Session</button>
    </div>

    <div class="stats-row">
      <div class="stat-box">
        <div class="stat-value" id="totalHours">0</div>
        <div class="stat-label">Total Hrs</div>
      </div>
      <div class="stat-box">
        <div class="stat-value" id="totalSessions">0</div>
        <div class="stat-label">Sessions</div>
      </div>
      <div class="stat-box">
        <div class="stat-value" id="avgHours">0</div>
        <div class="stat-label">Avg / Session</div>
      </div>
    </div>

    <div class="sessions-card">
      <div class="sessions-header">
        <span class="sessions-title">// log</span>
        <span class="sessions-count" id="countBadge">0 entries</span>
      </div>
      <ul id="sessionList"></ul>
    </div>

  </div>

  <script>
    // Use in-memory array (localStorage not available in all sandboxes)
    let sessions = [];

    function addSession() {
      const topicEl = document.getElementById("topic");
      const hoursEl = document.getElementById("hours");
      const topic = topicEl.value.trim();
      const hours = parseFloat(hoursEl.value);

      if (!topic || isNaN(hours) || hours <= 0) return;

      sessions.push({ topic, hours });
      topicEl.value = "";
      hoursEl.value = "";
      topicEl.focus();
      renderSessions();
    }

    function deleteSession(index) {
      sessions.splice(index, 1);
      renderSessions();
    }

    function renderSessions() {
      const list = document.getElementById("sessionList");
      list.innerHTML = "";

      if (sessions.length === 0) {
        list.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">◎</div>
            <div class="empty-text">No sessions yet. Add one above.</div>
          </div>`;
      } else {
        sessions.forEach((s, i) => {
          const li = document.createElement("li");
          li.innerHTML = `
            <div class="session-dot"></div>
            <span class="session-topic">${s.topic}</span>
            <span class="session-badge">${s.hours} hr${s.hours !== 1 ? 's' : ''}</span>
            <button class="delete-btn" onclick="deleteSession(${i})" title="Remove">✕</button>
          `;
          list.appendChild(li);
        });
      }

      const total = sessions.reduce((sum, s) => sum + s.hours, 0);
      const avg   = sessions.length ? (total / sessions.length).toFixed(1) : 0;

      document.getElementById("totalHours").textContent    = total % 1 === 0 ? total : total.toFixed(1);
      document.getElementById("totalSessions").textContent = sessions.length;
      document.getElementById("avgHours").textContent      = avg;
      document.getElementById("countBadge").textContent    = `${sessions.length} entr${sessions.length === 1 ? 'y' : 'ies'}`;
    }

    document.addEventListener("keydown", e => {
      if (e.key === "Enter") addSession();
    });

    renderSessions();
  </script>
</body>
</html>
