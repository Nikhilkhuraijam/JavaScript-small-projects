<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Markdown Blog Editor</title>

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono&family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Poppins',sans-serif;
height:100vh;
display:flex;
flex-direction:column;
background:linear-gradient(135deg,#020617,#0f172a,#020617);
color:white;
}

/* HEADER */

.header{
height:60px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 25px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(12px);
border-bottom:1px solid rgba(255,255,255,0.1);
}

.logo{
font-size:18px;
font-weight:600;
color:#38bdf8;
}

/* TOOLBAR */

.toolbar{
display:flex;
gap:10px;
}

.toolbar button{
background:#020617;
border:1px solid #334155;
color:#22c55e;
padding:6px 10px;
border-radius:6px;
cursor:pointer;
font-weight:500;
}

.toolbar button:hover{
background:#22c55e;
color:black;
}

/* MAIN LAYOUT */

.container{
display:flex;
flex:1;
overflow:hidden;
}

.panel{
width:50%;
display:flex;
flex-direction:column;
}

/* PANEL HEADER */

.panel-header{
padding:10px 15px;
background:#020617;
border-bottom:1px solid #334155;
font-size:14px;
color:#94a3b8;
}

/* EDITOR */

textarea{
flex:1;
background:#020617;
border:none;
outline:none;
color:#22c55e;
padding:20px;
font-family:'JetBrains Mono',monospace;
font-size:15px;
resize:none;
}

/* PREVIEW */

.preview{
flex:1;
background:#0f172a;
padding:25px;
overflow:auto;
}

/* MARKDOWN STYLE */

.preview h1{
color:#38bdf8;
margin-bottom:10px;
}

.preview h2{
color:#60a5fa;
margin-top:15px;
}

.preview h3{
color:#93c5fd;
margin-top:10px;
}

.preview p{
margin:10px 0;
line-height:1.6;
}

.preview code{
background:#020617;
padding:4px 8px;
border-radius:5px;
color:#22c55e;
font-family:'JetBrains Mono',monospace;
}

.preview b{
color:#facc15;
}

.preview i{
color:#f472b6;
}

/* SCROLLBAR */

::-webkit-scrollbar{
width:6px;
}

::-webkit-scrollbar-thumb{
background:#334155;
border-radius:3px;
}

</style>
</head>

<body>

<div class="header">

<div class="logo">Markdown Blog Editor</div>

<div class="toolbar">
<button onclick="insert('**bold text**')">Bold</button>
<button onclick="insert('*italic*')">Italic</button>
<button onclick="insert('# Heading')">H1</button>
<button onclick="insert('## Heading')">H2</button>
<button onclick="insert('`code`')">Code</button>
</div>

</div>

<div class="container">

<div class="panel">
<div class="panel-header">Editor</div>
<textarea id="markdown">

# My Blog

## Hello World

This is **bold text**

This is *italic text*

### Code

`console.log("Hello World")`

</textarea>
</div>

<div class="panel">
<div class="panel-header">Preview</div>
<div class="preview" id="preview"></div>
</div>

</div>

<script>

function parseMarkdown(text){

text=text.replace(/^### (.*$)/gim,'<h3>$1</h3>')
text=text.replace(/^## (.*$)/gim,'<h2>$1</h2>')
text=text.replace(/^# (.*$)/gim,'<h1>$1</h1>')
text=text.replace(/\*\*(.*?)\*\*/gim,'<b>$1</b>')
text=text.replace(/\*(.*?)\*/gim,'<i>$1</i>')
text=text.replace(/`(.*?)`/gim,'<code>$1</code>')
text=text.replace(/\n/g,'<br>')

return text
}

let textarea=document.getElementById("markdown")
let preview=document.getElementById("preview")

function update(){
preview.innerHTML=parseMarkdown(textarea.value)
}

textarea.addEventListener("input",update)

function insert(text){

let start=textarea.selectionStart
let end=textarea.selectionEnd
let before=textarea.value.substring(0,start)
let after=textarea.value.substring(end)

textarea.value=before+text+after
update()
}

update()

</script>

</body>
</html>
