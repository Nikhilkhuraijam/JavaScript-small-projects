<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Markdown Blog Editor</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">

<style>
:root {
  --bg:        #f0f2f5;
  --surface:   #ffffff;
  --surface2:  #f7f8fa;
  --border:    #dde1e7;
  --text:      #1a1d23;
  --muted:     #6b7280;
  --accent:    #2563eb;
  --accent-lt: #eff4ff;
  --green:     #16a34a;
  --yellow:    #b45309;
  --pink:      #9333ea;
  --header-h:  60px;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Inter', sans-serif;
  height: 100vh;
  display: flex;
  flex-direction: column;
  background: var(--bg);
  color: var(--text);
  transition: background 0.25s ease, color 0.25s ease;
}

/* ── DARK MODE ── */
body.dark {
  --bg:        #111318;
  --surface:   #1c1e24;
  --surface2:  #14161b;
  --border:    #2a2d36;
  --text:      #e4e6eb;
  --muted:     #8b949e;
  --accent:    #3b82f6;
  --accent-lt: #1e2d4a;
  --green:     #22c55e;
  --yellow:    #f59e0b;
  --pink:      #a855f7;
}

/* ── HEADER ── */
header {
  height: var(--header-h);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 28px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  box-shadow: 0 1px 4px rgba(0,0,0,0.06);
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 16px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: -0.01em;
}

.logo-icon {
  width: 32px;
  height: 32px;
  background: var(--accent);
  border-radius: 8px;
  display: grid;
  place-items: center;
  color: #fff;
  font-size: 15px;
  font-weight: 700;
  flex-shrink: 0;
}

/* ── TOOLBAR ── */
.toolbar {
  display: flex;
  align-items: center;
  gap: 6px;
}

.toolbar button {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--muted);
  padding: 6px 13px;
  border-radius: 6px;
  cursor: pointer;
  font-family: 'Inter', sans-serif;
  font-size: 13px;
  font-weight: 500;
  transition: all 0.15s ease;
  white-space: nowrap;
}

.toolbar button:hover {
  background: var(--accent-lt);
  border-color: var(--accent);
  color: var(--accent);
}

.toolbar .divider {
  width: 1px;
  height: 22px;
  background: var(--border);
  margin: 0 4px;
}

.toolbar .theme-btn {
  background: var(--surface2);
  border-color: var(--border);
  color: var(--muted);
  font-size: 14px;
  padding: 6px 10px;
}

.toolbar .theme-btn:hover {
  background: var(--accent-lt);
  border-color: var(--accent);
  color: var(--accent);
}

/* ── LAYOUT ── */
.container {
  display: flex;
  flex: 1;
  overflow: hidden;
}

.panel {
  width: 50%;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── PANEL HEADER ── */
.panel-header {
  padding: 9px 20px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  font-size: 11px;
  font-weight: 600;
  color: var(--muted);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  display: flex;
  align-items: center;
  gap: 7px;
  flex-shrink: 0;
}

.panel-header .dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--accent);
  opacity: 0.7;
}

.panel:first-child {
  border-right: 1px solid var(--border);
}

/* ── EDITOR ── */
textarea {
  flex: 1;
  background: var(--surface2);
  border: none;
  outline: none;
  color: var(--text);
  padding: 24px 28px;
  font-family: 'Fira Code', monospace;
  font-size: 14px;
  line-height: 1.75;
  resize: none;
  caret-color: var(--accent);
}

textarea::selection {
  background: var(--accent-lt);
  color: var(--accent);
}

/* ── PREVIEW ── */
.preview {
  flex: 1;
  background: var(--surface);
  padding: 28px 36px;
  overflow-y: auto;
  line-height: 1.75;
}

.preview h1 {
  font-size: 26px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: -0.02em;
  margin-bottom: 8px;
  padding-bottom: 10px;
  border-bottom: 2px solid var(--border);
}

.preview h2 {
  font-size: 20px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: -0.01em;
  margin-top: 28px;
  margin-bottom: 8px;
}

.preview h3 {
  font-size: 16px;
  font-weight: 600;
  color: var(--muted);
  margin-top: 20px;
  margin-bottom: 6px;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}

.preview p {
  font-size: 15px;
  color: var(--text);
  margin: 10px 0;
  line-height: 1.8;
}

.preview strong {
  color: var(--accent);
  font-weight: 600;
}

.preview em {
  color: var(--pink);
  font-style: italic;
}

.preview code {
  font-family: 'Fira Code', monospace;
  font-size: 13px;
  background: var(--accent-lt);
  color: var(--accent);
  padding: 2px 8px;
  border-radius: 5px;
  border: 1px solid var(--border);
}

/* ── STATUS BAR ── */
.statusbar {
  height: 28px;
  background: var(--accent);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 20px;
  flex-shrink: 0;
}

.statusbar span {
  font-size: 11px;
  color: rgba(255,255,255,0.85);
  font-weight: 500;
  letter-spacing: 0.03em;
}

.statusbar .status-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #86efac;
  display: inline-block;
  margin-right: 5px;
}

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb {
  background: var(--border);
  border-radius: 4px;
}
::-webkit-scrollbar-thumb:hover {
  background: var(--muted);
}
</style>
</head>

<body>

<header>
  <div class="logo">
    <div class="logo-icon">M</div>
    Markdown Editor
  </div>
  <div class="toolbar">
    <button onclick="insert('**bold text**')">Bold</button>
    <button onclick="insert('*italic*')">Italic</button>
    <button onclick="insert('# Heading')">H1</button>
    <button onclick="insert('## Heading')">H2</button>
    <button onclick="insert('`code`')">Code</button>
    <div class="divider"></div>
    <button class="theme-btn" onclick="toggleTheme()" title="Toggle theme">🌗</button>
  </div>
</header>

<div class="container">
  <div class="panel">
    <div class="panel-header">
      <span class="dot"></span> Editor
    </div>
    <textarea id="editor"># My Blog

## Hello World

This is **bold text**

This is *italic text*

### Code Example

`console.log("Hello World")`
</textarea>
  </div>

  <div class="panel">
    <div class="panel-header">
      <span class="dot"></span> Preview
    </div>
    <div class="preview" id="preview"></div>
  </div>
</div>

<div class="statusbar">
  <span><span class="status-dot"></span>Ready</span>
  <span id="word-count">0 words</span>
  <span id="char-count">0 chars</span>
</div>

<script>
  const editor  = document.getElementById('editor');
  const preview = document.getElementById('preview');
  const wordCount = document.getElementById('word-count');
  const charCount = document.getElementById('char-count');

  function parseMarkdown(text) {
    text = text
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');

    text = text.replace(/^### (.+)$/gm, '<h3>$1</h3>');
    text = text.replace(/^## (.+)$/gm,  '<h2>$1</h2>');
    text = text.replace(/^# (.+)$/gm,   '<h1>$1</h1>');
    text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    text = text.replace(/\*(.+?)\*/g,     '<em>$1</em>');
    text = text.replace(/`(.+?)`/g,       '<code>$1</code>');

    text = text.split('\n').map(line => {
      const t = line.trim();
      if (!t) return '';
      if (/^<(h[1-3]|ul|ol|li|pre|blockquote)/.test(t)) return t;
      return `<p>${t}</p>`;
    }).join('\n');

    return text;
  }

  function updateStats() {
    const val = editor.value.trim();
    const words = val ? val.split(/\s+/).length : 0;
    const chars = editor.value.length;
    wordCount.textContent = `${words} word${words !== 1 ? 's' : ''}`;
    charCount.textContent = `${chars} char${chars !== 1 ? 's' : ''}`;
  }

  function update() {
    preview.innerHTML = parseMarkdown(editor.value);
    updateStats();
  }

  function insert(syntax) {
    const start = editor.selectionStart;
    const end   = editor.selectionEnd;
    const selected = editor.value.substring(start, end);
    const before = editor.value.substring(0, start);
    const after  = editor.value.substring(end);
    const replacement = selected
      ? syntax.replace(/bold text|italic|Heading|code/, selected)
      : syntax;
    editor.value = before + replacement + after;
    editor.focus();
    editor.selectionStart = editor.selectionEnd = start + replacement.length;
    update();
  }

  function toggleTheme() {
    document.body.classList.toggle('dark');
  }

  editor.addEventListener('input', update);
  update();
</script>

</body>
</html>
