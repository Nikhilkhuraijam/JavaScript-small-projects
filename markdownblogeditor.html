<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Markdown Blog Editor</title>

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono&family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Poppins', sans-serif;
  height: 100vh;
  display: flex;
  flex-direction: column;
  background: linear-gradient(135deg, #0f172a, #1e293b, #0f172a);
  color: #e2e8f0;
  transition: background 0.3s ease, color 0.3s ease;
}

/* LIGHT MODE */
body.light {
  background: linear-gradient(135deg, #f8fafc, #e2e8f0, #f8fafc);
  color: #1e293b;
}

/* HEADER */
.header {
  height: 65px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 30px;
  background: rgba(255, 255, 255, 0.08);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid rgba(255, 255, 255, 0.15);
}

body.light .header {
  background: rgba(255, 255, 255, 0.7);
  border-bottom: 1px solid #cbd5e1;
}

.logo {
  font-size: 20px;
  font-weight: 600;
  color: #38bdf8;
  letter-spacing: 1px;
}

/* TOOLBAR */
.toolbar {
  display: flex;
  gap: 12px;
}

.toolbar button {
  background: rgba(255, 255, 255, 0.08);
  border: 1px solid #475569;
  color: #facc15;
  padding: 8px 14px;
  border-radius: 8px;
  cursor: pointer;
  font-weight: 500;
  transition: all 0.2s ease;
}

.toolbar button:hover {
  background: #facc15;
  color: #0f172a;
  transform: translateY(-2px);
}

body.light .toolbar button {
  background: #f1f5f9;
  border: 1px solid #cbd5e1;
  color: #2563eb;
}

body.light .toolbar button:hover {
  background: #2563eb;
  color: white;
}

/* MAIN LAYOUT */
.container {
  display: flex;
  flex: 1;
  overflow: hidden;
}

.panel {
  width: 50%;
  display: flex;
  flex-direction: column;
  border-right: 1px solid rgba(255, 255, 255, 0.1);
}

.panel:last-child {
  border-right: none;
}

/* PANEL HEADER */
.panel-header {
  padding: 12px 18px;
  background: rgba(255, 255, 255, 0.05);
  font-size: 15px;
  font-weight: 500;
  color: #94a3b8;
  border-bottom: 1px solid rgba(255, 255, 255, 0.1);
}

body.light .panel-header {
  background: #f1f5f9;
  color: #475569;
  border-bottom: 1px solid #cbd5e1;
}

/* EDITOR */
textarea {
  flex: 1;
  background: #0f172a;
  border: none;
  outline: none;
  color: #22c55e;
  padding: 20px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 15px;
  resize: none;
  line-height: 1.6;
}

body.light textarea {
  background: #f8fafc;
  color: #1e293b;
}

/* PREVIEW */
.preview {
  flex: 1;
  background: #1e293b;
  padding: 25px;
  overflow: auto;
  border-left: 1px solid rgba(255, 255, 255, 0.1);
}

body.light .preview {
  background: #ffffff;
  border-left: 1px solid #cbd5e1;
}

/* MARKDOWN STYLE */
.preview h1 {
  color: #38bdf8;
  margin-bottom: 12px;
  font-size: 26px;
}

.preview h2 {
  color: #60a5fa;
  margin-top: 18px;
  font-size: 22px;
}

.preview h3 {
  color: #93c5fd;
  margin-top: 12px;
  font-size: 18px;
}

.preview p {
  margin: 12px 0;
  line-height: 1.7;
}

.preview code {
  background: rgba(255, 255, 255, 0.08);
  padding: 4px 8px;
  border-radius: 6px;
  color: #22c55e;
  font-family: 'JetBrains Mono', monospace;
}

.preview b {
  color: #facc15;
}

.preview i {
  color: #f472b6;
}

/* SCROLLBAR */
::-webkit-scrollbar {
  width: 8px;
}

::-webkit-scrollbar-thumb {
  background: #475569;
  border-radius: 4px;
}
</style>
</head>

<body>

<div class="header">
  <div class="logo">Markdown Blog Editor</div>
  <div class="toolbar">
    <button onclick="insert('**bold text**')">Bold</button>
    <button onclick="insert('*italic*')">Italic</button>
    <button onclick="insert('# Heading')">H1</button>
    <button onclick="insert('## Heading')">H2</button>
    <button onclick="insert('`code`')">Code</button>
    <button onclick="toggleTheme()">🌗 Theme</button>
  </div>
</div>

<div class="container">
  <div class="panel">
    <div class="panel-header">Editor</div>
    <textarea id="markdown">
# My Blog

## Hello World

This is **bold text**

This is *italic text*

### Code

`console.log("Hello World")`
    </textarea>
  </div>

  <div class="panel">
    <div class="panel-header">Preview</div>
    <div class="preview" id="preview"></div>
  </div>
</div>

<script>
function parseMarkdown(text) {
  text = text.replace(/^### (.*$)/gim, '<h3>$1</h3>');
  text = text.replace(/^## (.*$)/gim, '<h2>$1</h2>');
  text = text.replace(/^# (.*$)/gim, '<h1>$1</h1>');
  text = text.replace(/\*\*(.*?)\*\*/gim, '<b>$1</b>');
  text = text.replace(/\*(.*?)\*/gim, '<i>$1</i>');
  text = text.replace(/`(.*?)`/gim, '<code>$1</code>');
  text = text.replace(/\n/g, '<br>');
  return text;
}

let textarea = document.getElementById("markdown");
let preview = document.getElementById("preview");

function update() {
  preview.innerHTML = parseMarkdown(textarea.value);
}

textarea.addEventListener("input", update);

function insert(text) {
  let start = textarea.selectionStart;
  let end = textarea.selectionEnd;
  let before = textarea.value.substring(0, start);
  let after = textarea.value.substring(end);
  textarea.value = before + text + after;
  update();
}

function toggleTheme() {
  document.body.classList.toggle("light");
}

update();
</script>

</body>
</html>
